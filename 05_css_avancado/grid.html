<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    
    <style>

        .container {
            color: #fff;
            padding: 10px;
            background-color: gray;
            display: grid;

            /* grid-template-areas: "a2 a2 a2 a2 a2 a2"
                                    "a1 a1 a3 a3 a3 a3"
                                    "a4 a4 a4 a5 a5 a5"
                                    "a6 a6 a6 a6 a6 a6"; */

            grid-template: auto auto auto auto / auto auto auto auto auto auto;
        }

        .r1 {
            background-color: red;
        }

        .r2 {
            background-color: green;
        }
        
        .r3 {
            background-color: blue;
        }

        .item1 {
            grid-column-start: 1;
            grid-column-end: 3;
            grid-row-start: 2;
            grid-row-end: 4;
        }
        .item2 {
            grid-column-start: 1;
            grid-column-end: 7;
        }
        .item3 {
            grid-column-end: span 4;
        }
        .item4 {
            grid-column-start: 4;
            grid-column-end: 7;
        }
        .item5 {
            grid-column-start: 3;
            grid-row-start: 3;
        }
        .item6 {
            grid-column-start: 1;
            grid-column-end: 7;
        }

        .rect {
            /* width: 100px;
            height: 100px; */
        }
    </style>

    <title>Grid</title>
</head>
<body>
    <div class="container">
        <div class="rect r1 item1">1</div>
        <div class="rect r2 item2">2</div>
        <div class="rect r3 item3">3</div>
        <div class="rect r1 item4">4</div>
        <div class="rect r2 item5">5</div>
        <div class="rect r3 item6">6</div>
    </div>
</body>
</html>
