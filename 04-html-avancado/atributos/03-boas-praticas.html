<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
  </head>
  <body>
    <!-- Incluir o "data-" ante do nome do atributo-->
    <ul id="list" data-number="20"></ul>

    <script>
      let list = document.getElementById("list");

      //Com o data- incluido no elemento, podemos defini-lo dessa maneira
      list.dataset.number = 10;
      //Também podemos acessar o atributo com o "dataset"
      let number = Number(list.dataset.number);

      let conteudo = "";

      for (let i = 1; i <= number; i++) {
        conteudo += `<li>${i}</li>`;
      }

      list.innerHTML = conteudo;
    </script>
  </body>
</html>
