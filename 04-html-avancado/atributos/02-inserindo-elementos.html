<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <ul id="list" number="10"></ul>

    <script>

        let list = document.getElementById('list');

        let number = Number(list.getAttribute('number'));

        let conteudo = "";

        for(let i = 1; i <= number; i++){
            conteudo += `<li>${i}</li>`
        };

        list.innerHTML = conteudo;

    </script>
</body>
</html>
