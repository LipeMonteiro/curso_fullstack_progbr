<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>

<body>
    <h1>0</h1>
    <input type="submit" value="Iniciar" onclick="iniciar()">
    <input type="submit" value="Parar" onclick="parar()">
    <input type="submit" value="Zerar" onclick="zerar()">

    <script>

        let h1 = document.querySelector("h1");
        let n = 0;
        let interval;
        
        function mudaTxt() {
            h1.innerText += n;
            n++;
        }

        function iniciar() {
            interval = setInterval(mudaTxt, 1000);
        }

        function parar() {
            clearInterval(interval);
        }

        function zerar() {
            n = 0
            h1.innerText = n
        }

    </script>

</body>

</html>
