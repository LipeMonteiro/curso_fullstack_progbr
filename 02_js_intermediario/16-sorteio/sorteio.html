        // ========== SORTEANDO CINCO NÚMEROS DE UM A CEM ==========

        function sortear() {
            const h1 = document.querySelector("h1");
            h1.innerHTML = ""

            const np = 100;

            for(let i = 1; i <= 5; i++){
                const ns = Math.round(Math.random() * np);
                h1.innerHTML += ns + " "
            }
        }
