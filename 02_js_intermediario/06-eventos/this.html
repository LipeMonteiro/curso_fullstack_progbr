<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>

    <h1>Um título</h1>
    <h2>Outro título</h2>

    <script>
        let h1 = document.querySelector('h1')
        let h2 = document.querySelector('h2')

        h1.onclick = upper
        h2.onclick = upper

        function upper(){
            this.innerHTML = this.innerHTML.toUpperCase()
        }

    </script>
</body>
</html>
