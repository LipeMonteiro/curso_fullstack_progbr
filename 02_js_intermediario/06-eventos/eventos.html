<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Eventos</title>

    <script>
        function changeh1(element){
            let h1 = document.querySelector('h1');
            h1.innerText = element.value
        }

    </script>

</head>
<body>
    <h1>Altere</h1>
    <input type="text" onchange="changeh1(this)">
</body>
</html>
